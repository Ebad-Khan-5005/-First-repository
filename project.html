<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- <img class="bgimg"
        src="https://www.shutterstock.com/shutterstock/photos/2331383645/display_1500/stock-photo-crystal-globe-on-many-currency-world-bank-money-transfers-and-currency-exchanges-between-2331383645.jpg"
        alt="error img"> -->


    <div class="container">
        <h2>Currency Converter</h2>

        <form>
            <div class="amount">
                <p>Enter Amount</p>
                <input value="100" type="text">
            </div>
            <div class="dropdown">
                <div class="from">
                    <p> From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png">
                        <select name="from"></select>
                    </div>
                </div>

                <div class="to">
                    <p>To </p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/PK/flat/64.png">
                        <select name="to"></select>
                    </div>
                </div>
            </div>
            <div class="msg"></div>
            <button id="btn">Get Exchange Rate</button>
    </div>
    </form>
    </div>
    <script src="data.js"></script>
    <script src="project.js"></script>
</body>

</html>
